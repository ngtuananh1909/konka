services:
  runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: konka-runner
    environment:
      RUNNER_HOST: 0.0.0.0
      RUNNER_PORT: 8788
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET:-konka-dev-secret}
      PYTHON_WORKER_CONTAINER: konka-python-worker
      TMPDIR: /tmp/konka-runner
    ports:
      - "8788:8788"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/konka-runner:/tmp/konka-runner
      - ./src:/app/src:ro

  python-worker:
    image: python:3.12-alpine
    container_name: konka-python-worker
    command: ["sleep", "infinity"]
    network_mode: "none"
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
